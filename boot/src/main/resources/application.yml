# ===================================================================
# Variables
# ===================================================================
# Sintaxis: &nombre_variable define a new variable
#           *nombre_variable use the variable
# ===================================================================
x-variables:
  app-name: &app-name rest-server

# ===================================================================
# Logger Configuration
# ===================================================================
logging:
  level:
    com.codenaiten.template.server: INFO

# ===================================================================
# Application Configuration
# ===================================================================
app:
  locale:
    default: ${LOCALE_DEFAULT:es}
    cookie:
      name: ${LOCALE_COOKIE_NAME:lang}

# ===================================================================
# Actuator Configuration
# ===================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

# ===================================================================
# Spring Configuration
# ===================================================================
spring:
  application:
    name: *app-name

  config:
    import:
      - optional:classpath:persistence/application.yml
      - optional:classpath:security/application.yml
      - optional:classpath:web/rest/application.yml

# ===================================================================
