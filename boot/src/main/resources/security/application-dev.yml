# ===================================================================
# Application Security Configuration
# ===================================================================
app:
  security:
    ignore-paths:
      all: "/**"

    cors:
      allowed-origins: ${SECURITY_CORS_ALLOWED_ORIGINS:*}
      allowed-methods: ${SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${SECURITY_CORS_ALLOWED_HEADERS:Content-Type,Authorization,Accept,Origin,X-Requested-With}
      exposed-headers: ${SECURITY_CORS_EXPOSED_HEADERS:Authorization,Token}
      allow-credentials: ${SECURITY_CORS_ALLOW_CREDENTIALS:true}

# ===================================================================
